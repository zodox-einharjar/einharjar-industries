services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    # Root .env supplies all config including DATABASE_URL pointing at the TrueNAS postgres.
    # NOTE: EVE_CALLBACK_URL must match the hostname you use to access the app
    #       AND be registered in your EVE developer app at developers.eveonline.com.
    env_file: .env
    environment:
      EVE_CALLBACK_URL: http://localhost/auth/callback
    volumes:
      # SDE SQLite is not baked into the image — mount the file from the host.
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # Preserve node_modules and .next from the image layer
      - frontend_nm:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  frontend_nm:
  frontend_next:
