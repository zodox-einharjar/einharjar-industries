upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"                 always;

    # EVE SSO — must stay in FastAPI
    location /auth/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # JSON API — /api/foo becomes /foo on the backend
    # Add routes here as FastAPI routes are converted to JSON.
    location /api/ {
        rewrite            ^/api/(.*)$ /$1 break;
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend static assets (served by FastAPI until fully replaced)
    location /static/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
    }

    # Next.js — everything else, including HMR websocket
    location / {
        proxy_pass             http://frontend;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
    }
}
