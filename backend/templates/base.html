<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EVE App{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <style>
        .bg-orange { background-color: #fd7e14 !important; }
        .text-orange { color: #fd7e14 !important; }
        .border-orange { border-color: #fd7e14 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">EVE App</a>
            <div class="d-flex align-items-center gap-3">
                {% if request.session.get("character_owner_hash") %}
                <a href="/inventory" class="nav-link text-secondary small">Inventory</a>
                <a href="/doctrines" class="nav-link text-secondary small">Doctrines</a>
                <a href="/fits" class="nav-link text-secondary small">Fits</a>
                <a href="/locations" class="nav-link text-secondary small">Locations</a>
                <a href="/auth/logout" class="btn btn-outline-secondary btn-sm">Logout</a>
                {% else %}
                <a href="/auth/login" class="btn btn-outline-light btn-sm">Login with EVE SSO</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
