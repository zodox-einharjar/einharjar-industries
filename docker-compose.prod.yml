configs:
  nginx_conf:
    content: |
      upstream backend  { server backend:8000; }
      upstream frontend { server frontend:3000; }
      server {
          listen 80;
          server_name YOUR_DOMAIN;

          add_header X-Content-Type-Options  "nosniff"                         always;
          add_header X-Frame-Options         "SAMEORIGIN"                      always;
          add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
          add_header X-XSS-Protection        "1; mode=block"                   always;

          location /auth/ {
              proxy_pass http://backend;
              proxy_set_header Host              $$host;
              proxy_set_header X-Real-IP         $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }
          location /api/ {
              rewrite ^/api/(.*)$$ /$1 break;
              proxy_pass http://backend;
              proxy_set_header Host              $$host;
              proxy_set_header X-Real-IP         $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }
          location /static/ {
              proxy_pass http://backend;
              proxy_set_header Host $$host;
          }
          location / {
              proxy_pass http://frontend;
              proxy_set_header Host              $$host;
              proxy_set_header X-Real-IP         $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

services:
  backend:
    image: ghcr.io/zodox-einharjar/einharjar-industries-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      EVE_CALLBACK_URL: http://YOUR_DOMAIN/auth/callback
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/eve_app
    volumes:
      - backend_data:/app/data
    depends_on:
      - db

  frontend:
    image: ghcr.io/zodox-einharjar/einharjar-industries-frontend:latest
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eve_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8484:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  backend_data:
  db_data:
